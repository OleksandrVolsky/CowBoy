<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>CowBoy</title>
</head>
<body>
   <div class="wrapper">
    <header class="header">
        <div class="header__container">
            <img src="img/logo.png" alt="Logo CowBoy" class="header__logo">
            <nav class="header__menu munu">
                <ul class="menu__list">
                    <li class="manu__item">
                        <a href="#" class="manu__link">Home</a>
                    </li>
                    <li class="manu__item">
                        <a href="#" class="manu__link">Models</a>
                    </li>
                    <li class="manu__item">
                        <a href="#" class="manu__link">Download</a>
                    </li>
                    <li class="manu__item">
                        <a href="#" class="manu__link">Video</a>
                    </li>
                </ul>
            </nav>
                <a href="#" class="header__button">Order new</a>
        </div>
    </header>
    <main class="page">
        <section class="hero">
            <div class="hero__container">
                <div class="hero__content">
                    <h1 class="hero__title">The Future of Urban Mobility</h1>
                    <div class="hero__text">
                        <p>
                            Experience the ride of your life with Cowboy’s sleek, smart, and powerful electric 
                            bikes designed for urban adventurers.
                        </p>
                    </div>
                    <div class="hero__buttons">
                        <a href="#" class="hero__button button button--dark">Explore Models</a>
                        <a href="#" class="hero__button button">Start Your Ride</a>
                    </div>
                </div>
                <figure class="hero__picture">
                    <img src="img/hero/image 159.png" alt="Image" class="hero__image">
                </figure>
            </div>
        </section>
    </main>
    <footer class="footer"></footer>
   </div>
</body>

</html>
